spring:
  application:
    name: stock-tracker
  h2:
    console:
      enabled: true
      path: /h2-console
stock:
  provider: alphavantage
  providers:
    alphavantage:
      api-key: ${ALPHAVANTAGE_API_KEY:demo}
      base-url: https://www.alphavantage.co/query

management:
  endpoints:
    web:
      exposure:
        include: health, caches